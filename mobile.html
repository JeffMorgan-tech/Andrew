<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Andrew — Software Support Specialist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --screen-bg: #121a28;
    --laugh-gold: #d4a050;
    --vhs-blue: #5b8ec9;
    --text-cream: #b8c8dc;
  }

  html, body {
    background: #0a0e14;
    color: var(--text-cream);
    font-family: 'Courier Prime', 'Courier New', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 16px 12px 100px;
  }

  /* ── Header ── */
  .mobile-header {
    text-align: center;
    padding: 16px 8px 20px;
    position: relative;
  }

  .mobile-header::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--laugh-gold), transparent);
    margin: 14px auto 0;
  }

  .badge {
    display: inline-block;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--laugh-gold);
    border: 1px solid var(--laugh-gold);
    padding: 3px 10px;
    border-radius: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1.show-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(28px, 8vw, 42px);
    background: linear-gradient(180deg, #d4a050 0%, #c08840 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.05;
  }

  .subtitle {
    font-family: 'Special Elite', cursive;
    font-size: 12px;
    color: #6a7e98;
    margin-top: 6px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── Room image with labeled tap hotspots ── */
  .room-wrapper {
    position: relative;
    width: 100%;
    max-width: 640px;
    margin: 0 auto 28px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(212, 160, 80, 0.2);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }

  .room-wrapper img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* Scanline overlay on the image */
  .room-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
  }

  /* Tap hotspots — always visible with labels on mobile */
  .tap-hotspot {
    position: absolute;
    cursor: pointer;
    border: 2px solid rgba(212, 160, 80, 0.7);
    border-radius: 4px;
    background: rgba(212, 160, 80, 0.12);
    box-shadow: 0 0 16px rgba(212, 160, 80, 0.3), inset 0 0 12px rgba(212, 160, 80, 0.1);
    -webkit-tap-highlight-color: transparent;
    animation: hotspot-pulse 2.4s ease-in-out infinite;
    z-index: 2;
  }

  .tap-hotspot:active {
    background: rgba(212, 160, 80, 0.35);
    transform: scale(0.96);
  }

  @keyframes hotspot-pulse {
    0%, 100% { box-shadow: 0 0 12px rgba(212, 160, 80, 0.25), inset 0 0 8px rgba(212, 160, 80, 0.08); }
    50% { box-shadow: 0 0 24px rgba(212, 160, 80, 0.5), inset 0 0 14px rgba(212, 160, 80, 0.2); }
  }

  /* Hotspot positions (same as desktop, measured from image) */
  #tap-left   { left: 37%; top: 35%;   width: 10%; height: 15%; }
  #tap-right  { left: 49%; top: 35.5%; width: 9.5%; height: 12.5%; }
  #tap-laptop { left: 64%; top: 49%;   width: 8%;  height: 8%; }

  /* ── Instruction text ── */
  .instructions {
    text-align: center;
    font-size: 13px;
    color: #7a8a9e;
    margin-bottom: 24px;
    padding: 0 20px;
    letter-spacing: 0.5px;
    line-height: 1.5;
  }

  .instructions .arrow {
    display: inline-block;
    color: var(--laugh-gold);
    animation: bounce 1.6s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }

  /* ── Quick-access menu cards (fallback / additional nav) ── */
  .quick-menu {
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 500px;
    width: 100%;
    margin: 0 auto;
    padding: 0 4px;
  }

  .quick-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: linear-gradient(180deg, #0f1620 0%, #0a0e14 100%);
    border: 1px solid rgba(212, 160, 80, 0.25);
    border-radius: 8px;
    color: inherit;
    text-decoration: none;
    transition: border-color 0.2s ease, transform 0.1s ease;
    position: relative;
    overflow: hidden;
  }

  .quick-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
  }

  .quick-card:active {
    transform: scale(0.98);
    border-color: var(--laugh-gold);
  }

  .quick-card .icon {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    background: rgba(212, 160, 80, 0.12);
    border: 1px solid rgba(212, 160, 80, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--laugh-gold);
    flex-shrink: 0;
    z-index: 1;
  }

  .quick-card .icon svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }

  .quick-card .text {
    flex: 1;
    z-index: 1;
  }

  .quick-card .text .label {
    font-family: 'Courier Prime', monospace;
    color: var(--laugh-gold);
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .quick-card .text .hint {
    font-size: 11px;
    color: var(--text-cream);
    opacity: 0.65;
    margin-top: 2px;
  }

  .quick-card .chevron {
    color: var(--laugh-gold);
    opacity: 0.5;
    font-size: 20px;
    z-index: 1;
  }

  /* ── Popup overlay for episode list ── */
  .popup-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .popup-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .popup-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(10, 14, 20, 0.75);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .popup-card {
    position: relative;
    width: 100%;
    max-width: 520px;
    max-height: 85vh;
    max-height: 85dvh;
    background: linear-gradient(180deg, #0f1620 0%, #0a0e14 100%);
    border-top: 1px solid rgba(212, 160, 80, 0.35);
    border-left: 1px solid rgba(212, 160, 80, 0.2);
    border-right: 1px solid rgba(212, 160, 80, 0.2);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.7);
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    overflow: hidden;
  }

  .popup-overlay.active .popup-card {
    transform: translateY(0);
  }

  .popup-handle {
    width: 40px;
    height: 4px;
    background: rgba(212, 160, 80, 0.4);
    border-radius: 2px;
    margin: 10px auto 4px;
    flex-shrink: 0;
  }

  .popup-header {
    padding: 12px 24px 14px;
    border-bottom: 1px solid rgba(212, 160, 80, 0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .popup-header h2 {
    color: var(--laugh-gold);
    font-family: 'Courier Prime', monospace;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .popup-close {
    width: 32px;
    height: 32px;
    background: rgba(10, 14, 20, 0.7);
    border: 1px solid rgba(212, 160, 80, 0.3);
    border-radius: 50%;
    color: var(--text-cream);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .popup-list {
    list-style: none;
    overflow-y: auto;
    padding: 12px 16px 24px;
    -webkit-overflow-scrolling: touch;
  }

  .popup-list li {
    margin-bottom: 6px;
  }

  .popup-list a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 14px;
    color: var(--text-cream);
    text-decoration: none;
    font-family: 'Courier Prime', monospace;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    line-height: 1.35;
  }

  .popup-list a:active {
    background: rgba(212, 160, 80, 0.12);
    border-color: rgba(212, 160, 80, 0.3);
    color: var(--laugh-gold);
  }

  .popup-list a .ep-num {
    color: var(--vhs-blue);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ── Music player (compact icon-only for mobile) ── */
  .music-btn {
    position: fixed;
    bottom: 18px;
    left: 18px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(15, 22, 32, 0.95) 0%, rgba(10, 14, 20, 0.95) 100%);
    border: 1px solid rgba(212, 160, 80, 0.4);
    color: var(--laugh-gold);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 40;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5), 0 0 10px rgba(212, 160, 80, 0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 0;
    transition: transform 0.2s ease;
  }

  .music-btn:active {
    transform: scale(0.92);
  }

  .music-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  .music-btn .icon-pause { display: none; }
  .music-btn.playing .icon-play { display: none; }
  .music-btn.playing .icon-pause { display: block; }

  /* Pulsing ring when playing */
  .music-btn.playing::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid var(--laugh-gold);
    opacity: 0;
    animation: music-ring 2s ease-out infinite;
  }

  @keyframes music-ring {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.25); }
  }

  /* ── Footer credit ── */
  .footer-credit {
    text-align: center;
    font-size: 10px;
    color: #4a5e78;
    margin-top: 24px;
    padding: 0 20px 10px;
    letter-spacing: 1px;
  }

  .footer-credit span {
    color: var(--laugh-gold);
  }
</style>
</head>
<body>

<header class="mobile-header">
  <div class="badge">Season 01</div>
  <h1 class="show-title">Andrew</h1>
  <div class="subtitle">Software Support Specialist</div>
</header>

<div class="room-wrapper">
  <img src="AndrewOfficeImage.png" alt="Andrew's office" draggable="false">
  <div class="tap-hotspot" id="tap-left" data-target="left" aria-label="Episodes 1 to 6"></div>
  <div class="tap-hotspot" id="tap-right" data-target="right" aria-label="Episodes 7 to 13"></div>
  <div class="tap-hotspot" id="tap-laptop" data-target="laptop" aria-label="TV Guide"></div>
</div>

<p class="instructions">
  Tap a monitor or the laptop to browse episodes<br>
  <span class="arrow">▼</span>
</p>

<nav class="quick-menu">
  <a href="#" class="quick-card" data-target="left">
    <div class="icon">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
    </div>
    <div class="text">
      <div class="label">Episodes 1–6</div>
      <div class="hint">Left monitor · 6 episodes</div>
    </div>
    <div class="chevron">›</div>
  </a>
  <a href="#" class="quick-card" data-target="right">
    <div class="icon">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
    </div>
    <div class="text">
      <div class="label">Episodes 7–13</div>
      <div class="hint">Right monitor · 7 episodes</div>
    </div>
    <div class="chevron">›</div>
  </a>
  <a href="#" class="quick-card" data-target="laptop">
    <div class="icon">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
    </div>
    <div class="text">
      <div class="label">TV Guide</div>
      <div class="hint">Laptop · Season overview</div>
    </div>
    <div class="chevron">›</div>
  </a>
</nav>

<p class="footer-credit">
  Music created exclusively by <span>Andrew</span><br>
  <a href="index.html?desktop=1" style="color: #4a5e78; text-decoration: underline; font-size: 9px; letter-spacing: 1px;">View desktop version</a>
</p>

<!-- Popup overlay -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-backdrop" id="popupBackdrop"></div>
  <div class="popup-card">
    <div class="popup-handle"></div>
    <div class="popup-header">
      <h2 id="popupTitle"></h2>
      <button class="popup-close" id="popupClose" aria-label="Close">&times;</button>
    </div>
    <ul class="popup-list" id="popupList"></ul>
  </div>
</div>

<!-- Music -->
<audio id="bgMusic" src="Andrew.mp3" loop preload="auto"></audio>
<button class="music-btn" id="musicBtn" aria-label="Play music">
  <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
  <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
</button>

<script>
(function() {
  var episodes = {
    left: {
      title: 'Episodes 1–6',
      list: [
        { num: 'S01E01', title: 'Remote Work is Fun', file: 'S01E01-Remote Work is Fun.html' },
        { num: 'S01E02', title: 'New Hires...', file: 'S01E02-New Hires...html' },
        { num: 'S01E03', title: "Corine Don't Play", file: "S01E03-Corine Don't Play.html" },
        { num: 'S01E04', title: 'Away From Keyboard', file: 'S01E04-Away From Keyboard.html' },
        { num: 'S01E05', title: 'The Chain of Command (of Fools)', file: 'S01E05-The Chain of Command (of Fools).html' },
        { num: 'S01E06', title: 'Reply All My Enemies', file: 'S01E06-Reply All My Enemies.html' }
      ]
    },
    right: {
      title: 'Episodes 7–13',
      list: [
        { num: 'S01E07', title: 'The Mute Button Exists for a Reason', file: 'S01E07-The Mute Button Exists for a Reason.html' },
        { num: 'S01E08', title: 'Out of Office', file: 'S01E08-Out of Office.html' },
        { num: 'S01E09', title: 'Andrew Knows Best', file: 'S01E09-Andrew Knows Best.html' },
        { num: 'S01E10', title: 'Panic! At the Helpdesk', file: 'S01E10-Panic! At the Helpdesk.html' },
        { num: 'S01E11', title: 'Email Distribution Lists', file: 'S01E11-Email Distribution Lists.html' },
        { num: 'S01E12', title: 'Fly Little Birds Pt1', file: 'S01E12-Fly Little Birds Pt1.html' },
        { num: 'S01E13', title: 'Fly Little Birds Pt2', file: 'S01E13-Fly Little Birds Pt2.html' }
      ]
    },
    laptop: {
      directLink: 'AndrewTVGuideSpot.html'
    }
  };

  var overlay = document.getElementById('popupOverlay');
  var backdrop = document.getElementById('popupBackdrop');
  var popupClose = document.getElementById('popupClose');
  var popupTitle = document.getElementById('popupTitle');
  var popupList = document.getElementById('popupList');
  var popupOpen = false;

  function openPopup(targetKey) {
    var data = episodes[targetKey];
    if (!data) return;

    if (data.directLink) {
      window.location.href = encodeURI(data.directLink);
      return;
    }

    popupTitle.textContent = data.title;
    popupList.innerHTML = '';
    data.list.forEach(function(ep) {
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = encodeURI(ep.file);
      var num = document.createElement('span');
      num.className = 'ep-num';
      num.textContent = ep.num;
      a.appendChild(num);
      a.appendChild(document.createTextNode(ep.title));
      li.appendChild(a);
      popupList.appendChild(li);
    });

    overlay.classList.add('active');
    popupOpen = true;
    document.body.style.overflow = 'hidden';
  }

  function closePopup() {
    overlay.classList.remove('active');
    popupOpen = false;
    document.body.style.overflow = '';
  }

  // Tap hotspots on the image
  document.querySelectorAll('.tap-hotspot').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      openPopup(el.dataset.target);
    });
  });

  // Quick-menu cards
  document.querySelectorAll('.quick-card').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      openPopup(el.dataset.target);
    });
  });

  // Close handlers
  backdrop.addEventListener('click', closePopup);
  popupClose.addEventListener('click', closePopup);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && popupOpen) closePopup();
  });

  // ── Background music ──
  var bgMusic = document.getElementById('bgMusic');
  var musicBtn = document.getElementById('musicBtn');
  var hasAutoStarted = false;

  bgMusic.volume = 0.5;

  function playMusic() {
    var p = bgMusic.play();
    if (p && typeof p.then === 'function') {
      p.then(function() {
        musicBtn.classList.add('playing');
        musicBtn.setAttribute('aria-label', 'Pause music');
      }).catch(function() {});
    }
  }

  function pauseMusic() {
    bgMusic.pause();
    musicBtn.classList.remove('playing');
    musicBtn.setAttribute('aria-label', 'Play music');
  }

  musicBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (bgMusic.paused) {
      playMusic();
    } else {
      pauseMusic();
    }
  });

  // Autoplay on first tap anywhere
  function tryAutoStart() {
    if (hasAutoStarted) return;
    hasAutoStarted = true;
    playMusic();
    document.removeEventListener('click', tryAutoStart, true);
    document.removeEventListener('touchend', tryAutoStart, true);
  }
  document.addEventListener('click', tryAutoStart, true);
  document.addEventListener('touchend', tryAutoStart, true);
})();
</script>
</body>
</html>
